name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: List available watchOS simulators
        run: xcrun simctl list devices available watchOS

      - name: Run tests
        run: >
          xcodebuild test
          -project CrownSpin/CrownSpin.xcodeproj
          -scheme "CrownSpin Watch App"
          -destination "platform=watchOS Simulator,OS=latest,name=Apple Watch Ultra 2 (49mm)"
          -only-testing:CrownSpinTests
          -resultBundlePath TestResults

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult
